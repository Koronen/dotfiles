min_version = "2026.4.22"

[settings]
auto_install = false
idiomatic_version_file_enable_tools = ["node", "ruby"]
minimum_release_age = "3d"

[settings.ruby]
default_packages_file = "~/.config/ruby/default-gems"

[tools]
devcontainer-cli = "latest"
gh = "latest"
node = "lts"
ruby = "latest"
sops = "latest"
usage = "latest"
yamlfmt = "latest"
